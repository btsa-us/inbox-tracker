<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTSA — Inbox Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --surface3: #e8e6e2;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #111110;
  --text2: #111110;
  --text3: #555552;
  --accent: #111110;
  --accent-dim: rgba(0,0,0,0.06);
  --wholesale: #0080c0;
  --wholesale-dim: rgba(0,128,192,0.08);
  --info: #8000c0;
  --info-dim: rgba(128,0,192,0.08);
  --orders: #c06000;
  --orders-dim: rgba(192,96,0,0.08);
  --status-none: #ebebeb;
  --status-none-t: #888;
  --status-responded: #e6f4e6;
  --status-responded-t: #287028;
  --status-followup: #fff4e6;
  --status-followup-t: #b05a00;
  --status-spam: #fce8e8;
  --status-spam-t: #a02020;
  --status-norsp: #f4f0e0;
  --status-norsp-t: #706010;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
}

.logo img {
  height: 36px;
  width: auto;
  display: block;
}

.header-stats {
  display: flex;
  gap: 20px;
  align-items: center;
}

.hstat {
  font-size: 11px;
  font-weight: 400;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.hstat span {
  font-weight: 600;
  letter-spacing: 0.04em;
}
.hstat strong { color: var(--text); font-weight: 700; }
.hstat-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
}

/* TABS */
.tabs-bar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 11px 16px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  outline: none;
  letter-spacing: 0.05em;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

.tab-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tab-count {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
}
.tab.active .tab-count { color: var(--text2); }

/* TOOLBAR */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}
.search-wrap input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 6px 10px 6px 32px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 300;
  outline: none;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus { border-color: var(--text2); }

.filter-btns {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.fbtn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.12s;
}
.fbtn:hover { border-color: var(--border2); color: var(--text); }
.fbtn.active { background: var(--accent-dim); border-color: rgba(212,240,96,0.3); color: var(--accent); }

.toolbar-right {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

.tbtn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.12s;
}
.tbtn:hover { color: var(--text); border-color: var(--text2); }

/* TABLE */
.table-wrap {
  overflow-x: auto;
  padding: 0 28px 60px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

thead th {
  padding: 10px 12px;
  text-align: left;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  background: var(--surface);
  position: sticky;
  top: 0;
}
thead th:hover { color: var(--text2); }
thead th.sorted { color: var(--text); }

.sort-arrow { margin-left: 4px; opacity: 0.5; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.08s;
}
tbody tr:hover { background: var(--surface2); }

tbody td {
  padding: 9px 12px;
  vertical-align: middle;
  font-size: 14px;
  font-weight: 300;
  color: var(--text2);
}

.td-date { color: var(--text3); font-size: 13px; font-weight: 300; white-space: nowrap; }
.td-name { color: var(--text); font-weight: 400; font-size: 15px; letter-spacing: 0.04em; }
.td-email { color: var(--text2); font-size: 13px; font-weight: 300; }
.td-subject { color: var(--text); max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; font-weight: 400; }
.td-message { color: var(--text3); max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; font-weight: 300; }

.inbox-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 3px;
  padding: 2px 7px;
  font-size: 10px;
  white-space: nowrap;
  font-weight: 600;
}
.inbox-badge.wholesale { background: var(--wholesale-dim); color: var(--wholesale); }
.inbox-badge.info { background: var(--info-dim); color: var(--info); }
.inbox-badge.orders { background: var(--orders-dim); color: var(--orders); }

/* STATUS CELL */
.status-select {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 3px 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text2);
  cursor: pointer;
  outline: none;
  width: 100%;
  min-width: 130px;
}
.status-select:focus { border-color: var(--border2); }

/* Colored status selects */
.status-select.s-responded { background: var(--status-responded); color: var(--status-responded-t); border-color: rgba(110,207,110,0.2); }
.status-select.s-followup { background: var(--status-followup); color: var(--status-followup-t); border-color: rgba(240,160,96,0.2); }
.status-select.s-spam { background: var(--status-spam); color: var(--status-spam-t); border-color: rgba(207,110,110,0.2); }
.status-select.s-norsp { background: var(--status-norsp); color: var(--status-norsp-t); border-color: rgba(196,184,96,0.2); }

/* ASSIGNED CELL */
.assignee-select {
  background: transparent;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.05em;
  color: var(--text2);
  cursor: pointer;
  outline: none;
  padding: 2px 4px;
}
.assignee-select:focus { color: var(--text); }

/* NOTES CELL */
.notes-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text2);
  width: 100%;
  min-width: 140px;
  outline: none;
  padding: 2px 4px;
  transition: border-color 0.12s;
}
.notes-input:focus { border-bottom-color: var(--border2); color: var(--text); }
.notes-input::placeholder { color: var(--text3); }

/* ACTIONS CELL */
.action-select {
  background: transparent;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text2);
  cursor: pointer;
  outline: none;
  padding: 2px 4px;
  min-width: 120px;
}
.action-select:focus { color: var(--text); }

/* EMPTY */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state p { margin-top: 8px; font-size: 11px; font-weight: 300; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  border: 1px solid var(--text);
  border-radius: 4px;
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 400;
  color: var(--surface);
  opacity: 0;
  transition: all 0.2s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* PROGRESS BAR */
.progress-bar-wrap {
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.progress-label { font-size: 11px; font-weight: 600; color: var(--text3); white-space: nowrap; }
.progress-track {
  flex: 1;
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  min-width: 80px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.progress-pct { font-size: 11px; color: var(--text); font-weight: 700; min-width: 32px; }

/* MSG EXPAND */
.msg-cell { cursor: pointer; }
.msg-cell:hover .td-message { color: var(--text2); }

/* Row expand panel */
.row-expanded td {
  background: var(--surface2) !important;
}
.expand-panel {
  padding: 12px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 300;
  line-height: 1.6;
  color: var(--text2);
  white-space: pre-wrap;
}
.expand-panel strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://cdn.shopify.com/s/files/1/0770/7089/3249/files/BTSA_Logo_Outline.png?v=1776967533" alt="BTSA">
    <span class="logo-sub">Inbox Submissions</span>
  </div>
    <div class="hstat">
      <div class="hstat-dot" style="background:var(--wholesale)"></div>
      <span>wholesale</span> <strong id="hs-wholesale">—</strong>
    </div>
    <div class="hstat">
      <div class="hstat-dot" style="background:var(--info)"></div>
      <span>info</span> <strong id="hs-info">—</strong>
    </div>
    <div class="hstat">
      <div class="hstat-dot" style="background:var(--orders)"></div>
      <span>orders</span> <strong id="hs-orders">—</strong>
    </div>
    <div class="hstat" style="margin-left:8px; padding-left:16px; border-left:1px solid var(--border);">
      <span>total</span> <strong id="hs-total">—</strong>
    </div>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab active" data-tab="all">
    <div class="tab-dot" style="background:var(--accent)"></div>
    All Inboxes
    <span class="tab-count" id="tc-all">0</span>
  </button>
  <button class="tab" data-tab="wholesale">
    <div class="tab-dot" style="background:var(--wholesale)"></div>
    wholesale@btsa.us
    <span class="tab-count" id="tc-wholesale">0</span>
  </button>
  <button class="tab" data-tab="info">
    <div class="tab-dot" style="background:var(--info)"></div>
    info@btsa.us
    <span class="tab-count" id="tc-info">0</span>
  </button>
  <button class="tab" data-tab="orders">
    <div class="tab-dot" style="background:var(--orders)"></div>
    orders@btsa.us
    <span class="tab-count" id="tc-orders">0</span>
  </button>
</div>

<div class="progress-bar-wrap">
  <span class="progress-label">Response progress</span>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="prog-pct">0%</span>
  <span class="progress-label" id="prog-detail" style="margin-left:8px"></span>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search name, email, subject…">
  </div>
  <div class="filter-btns">
    <button class="fbtn active" data-filter="all">All</button>
    <button class="fbtn" data-filter="No Response Yet">No Response</button>
    <button class="fbtn" data-filter="Responded">Responded</button>
    <button class="fbtn" data-filter="Follow Up Needed">Follow Up</button>
    <button class="fbtn" data-filter="Spam">Spam</button>
  </div>
  <div class="toolbar-right">
    <button class="tbtn" id="add-btn">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add Row
    </button>
    <button class="tbtn" id="export-btn">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export CSV
    </button>
  </div>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th data-col="date" class="sorted">Date Received <span class="sort-arrow">↓</span></th>
        <th data-col="name">Name</th>
        <th data-col="email">Email</th>
        <th data-col="subject">Subject</th>
        <th data-col="message">Message</th>
        <th data-col="inbox">Inbox</th>
        <th data-col="status">Response Status</th>
        <th data-col="assignee">Responded By</th>
        <th data-col="action">Action Taken</th>
        <th data-col="notes">Notes</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYKFoggsHWRYowMafmUR7YT1MsP3I9ZR_IS72efBRPG3aF9bY0u5Igz88fqnrtCw_Lcg/exec';

const STATUS_OPTS = [
  { val: '', label: '— unset —' },
  { val: 'No Response Yet', label: 'No Response Yet' },
  { val: 'Responded', label: 'Responded' },
  { val: 'Follow Up Needed', label: 'Follow Up Needed' },
  { val: 'Spam', label: 'Spam' },
];

const ACTION_OPTS = [
  { val: '', label: '— none —' },
  { val: 'Account set-up', label: 'Account set-up' },
  { val: 'Sent application', label: 'Sent application' },
  { val: 'Referred to PFD page', label: 'Referred to PFD page' },
  { val: 'Referred customer to email updates', label: 'Referred to email updates' },
  { val: 'Advised PFD & Cloud Dancer diff colors', label: 'Advised PFD colors' },
  { val: 'Not pursuing at the moment', label: 'Not pursuing' },
  { val: 'Sent samples', label: 'Sent samples' },
  { val: 'Other', label: 'Other' },
];

const ASSIGNEES = ['—', 'Eric', 'Nayeli', '@btsa_email', 'Daniel', 'Victor', 'Other'];

let DATA = [];
let activeTab = 'all';
let activeFilter = 'all';
let searchQuery = '';
let sortCol = 'date';
let sortDir = 1;
let expandedRow = null;
let isLoading = true;

// ── FETCH from Apps Script ──
async function fetchData() {
  showLoading(true);
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const rows = await res.json();
    DATA = rows.map(r => ({
      id:       r.id,
      date:     formatDate(r.date),
      name:     r.name     || '',
      email:    r.email    || '',
      subject:  r.subjectLine || r.subject || '',
      message:  r.message  || '',
      inbox:    r.inbox    || '',
      status:   r.status   || '',
      assignee: r.assignee || '',
      action:   r.action   || '',
      notes:    r.notes    || ''
    }));
    isLoading = false;
    renderTable();
  } catch(err) {
    showLoading(false);
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="10"><div class="empty-state"><p style="color:#a02020">Could not load data. Check Apps Script deployment and permissions.</p></div></td></tr>';
  }
}

function formatDate(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d)) return String(raw);
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function showLoading(on) {
  if (on) {
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="10"><div class="empty-state"><p style="color:var(--text3)">Loading from Google Sheets…</p></div></td></tr>';
  }
}

// ── SAVE a single row change back to Apps Script ──
async function saveRow(id, field, value) {
  const row = DATA.find(r => r.id === id);
  if (!row) return;
  row[field] = value;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ id: row.id, status: row.status, assignee: row.assignee, action: row.action, notes: row.notes }),
      headers: { 'Content-Type': 'text/plain' }
    });
    showToast('Saved to Google Sheets ✓');
  } catch(err) {
    showToast('Save failed — check connection');
  }
}

// Auto-refresh every 60 seconds to pick up new Formspree submissions
setInterval(fetchData, 60000);

function getInboxColor(inbox) {
  return inbox === 'wholesale' ? 'var(--wholesale)' : inbox === 'info' ? 'var(--info)' : 'var(--orders)';
}

function statusClass(s) {
  if (s === 'Responded') return 's-responded';
  if (s === 'Follow Up Needed') return 's-followup';
  if (s === 'Spam') return 's-spam';
  if (s === 'No Response Yet') return 's-norsp';
  return '';
}

function filteredData() {
  let d = DATA.slice();
  if (activeTab !== 'all') d = d.filter(r => r.inbox === activeTab);
  if (activeFilter !== 'all') d = d.filter(r => r.status === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    d = d.filter(r => (r.name||'').toLowerCase().includes(q) || (r.email||'').toLowerCase().includes(q) || (r.subject||'').toLowerCase().includes(q) || (r.message||'').toLowerCase().includes(q));
  }
  d.sort((a,b) => {
    let av = a[sortCol] || '', bv = b[sortCol] || '';
    if (sortCol === 'date') { av = new Date(av); bv = new Date(bv); }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });
  return d;
}

function updateCounts() {
  const all = DATA.length;
  const w = DATA.filter(r => r.inbox === 'wholesale').length;
  const i = DATA.filter(r => r.inbox === 'info').length;
  const o = DATA.filter(r => r.inbox === 'orders').length;
  document.getElementById('tc-all').textContent = all;
  document.getElementById('tc-wholesale').textContent = w;
  document.getElementById('tc-info').textContent = i;
  document.getElementById('tc-orders').textContent = o;
  document.getElementById('hs-wholesale').textContent = w;
  document.getElementById('hs-info').textContent = i;
  document.getElementById('hs-orders').textContent = o;
  document.getElementById('hs-total').textContent = all;

  const visible = activeTab === 'all' ? DATA : DATA.filter(r => r.inbox === activeTab);
  const responded = visible.filter(r => r.status === 'Responded' || r.status === 'Follow Up Needed').length;
  const pct = visible.length ? Math.round(responded / visible.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-detail').textContent = responded + ' of ' + visible.length + ' contacted';
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const rows = filteredData();
  tbody.innerHTML = '';

  if (!rows.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="10"><div class="empty-state"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 0 0 2.22 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg><p>No results found</p></div></td>';
    tbody.appendChild(tr);
    return;
  }

  rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.dataset.id = row.id;
    if (expandedRow === row.id) tr.classList.add('row-expanded');

    const inboxLabel = row.inbox === 'wholesale' ? 'wholesale@btsa.us' : row.inbox === 'info' ? 'info@btsa.us' : 'orders@btsa.us';

    tr.innerHTML = `
      <td class="td-date">${row.date}</td>
      <td class="td-name">${escHtml(row.name)}</td>
      <td class="td-email" style="font-size:11px">${escHtml(row.email)}</td>
      <td class="td-subject">${escHtml(row.subject)}</td>
      <td class="msg-cell" data-id="${row.id}"><div class="td-message">${escHtml(row.message)}</div></td>
      <td><span class="inbox-badge ${row.inbox}"><span style="width:5px;height:5px;border-radius:50%;background:${getInboxColor(row.inbox)};display:inline-block"></span>${inboxLabel}</span></td>
      <td>
        <select class="status-select ${statusClass(row.status)}" data-id="${row.id}" data-field="status">
          ${STATUS_OPTS.map(o => `<option value="${o.val}"${row.status===o.val?' selected':''}>${o.label}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="assignee-select" data-id="${row.id}" data-field="assignee">
          ${ASSIGNEES.map(a => `<option value="${a}"${row.assignee===a?' selected':''}>${a}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="action-select" data-id="${row.id}" data-field="action">
          ${ACTION_OPTS.map(o => `<option value="${o.val}"${row.action===o.val?' selected':''}>${o.label}</option>`).join('')}
        </select>
      </td>
      <td>
        <input class="notes-input" type="text" placeholder="add note…" value="${escHtml(row.notes)}" data-id="${row.id}" data-field="notes">
      </td>
    `;

    tbody.appendChild(tr);

    if (expandedRow === String(row.id)) {
      const expTr = document.createElement('tr');
      expTr.innerHTML = `<td colspan="10"><div class="expand-panel"><strong>Full Message</strong>${escHtml(row.message)}</div></td>`;
      tbody.appendChild(expTr);
    }
  });

  updateCounts();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateField(id, field, value) {
  const idx = DATA.findIndex(r => r.id === id);
  if (idx === -1) return;
  DATA[idx][field] = value;
  saveRow(id, field, value);
  if (field === 'status') {
    const sel = document.querySelector(`select[data-id="${id}"][data-field="status"]`);
    if (sel) { sel.className = 'status-select ' + statusClass(value); }
    updateCounts();
  }
}

document.getElementById('table-body').addEventListener('change', e => {
  const el = e.target;
  const id = el.dataset.id;
  const field = el.dataset.field;
  if (id && field) updateField(id, field, el.value);
});

document.getElementById('table-body').addEventListener('input', e => {
  const el = e.target;
  if (el.tagName === 'INPUT' && el.dataset.id && el.dataset.field) {
    clearTimeout(el._timer);
    el._timer = setTimeout(() => updateField(el.dataset.id, el.dataset.field, el.value), 800);
  }
});

document.getElementById('table-body').addEventListener('click', e => {
  const cell = e.target.closest('.msg-cell');
  if (cell) {
    const id = cell.dataset.id;
    expandedRow = expandedRow === id ? null : id;
    renderTable();
  }
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    expandedRow = null;
    renderTable();
  });
});

document.querySelectorAll('.fbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = b.dataset.filter;
    renderTable();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderTable();
});

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(h => { h.classList.remove('sorted'); h.querySelector('.sort-arrow') && (h.querySelector('.sort-arrow').textContent = ''); });
    th.classList.add('sorted');
    const arr = th.querySelector('.sort-arrow') || (() => { const s = document.createElement('span'); s.className='sort-arrow'; th.appendChild(s); return s; })();
    arr.textContent = sortDir === 1 ? ' ↓' : ' ↑';
    renderTable();
  });
});

document.getElementById('add-btn').addEventListener('click', () => {
  showToast('Add rows by submitting via the website form or directly in Google Sheets');
});

document.getElementById('export-btn').addEventListener('click', () => {
  const rows = filteredData();
  const headers = ['Date','Name','Email','Subject','Message','Inbox','Response Status','Responded By','Action Taken','Notes'];
  const csv = [headers.join(','), ...rows.map(r =>
    [r.date, r.name, r.email, r.subject, r.message, r.inbox, r.status, r.assignee, r.action, r.notes]
      .map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',')
  )].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `btsa_inbox_${activeTab}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Exported');
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

fetchData();
</script>
</body>
</html>
